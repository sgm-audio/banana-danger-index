<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="peel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fae154"/>
      <stop offset="50%" stop-color="#ecc848"/>
      <stop offset="100%" stop-color="#bf9630"/>
    </linearGradient>
    <linearGradient id="flesh" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef9e0"/>
      <stop offset="100%" stop-color="#f5ecc0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Peel shadow -->
  <ellipse cx="48" cy="60" rx="30" ry="10" fill="rgba(0,0,0,0.15)" transform="rotate(-12, 48, 60)"/>

  <!-- Outer peel crescent -->
  <path d="M 22 40 C 25 20, 48 8, 70 18 C 78 22, 80 32, 76 40 C 70 34, 62 30, 52 30 C 42 30, 32 34, 22 40 Z"
        fill="url(#peel)" filter="url(#shadow)" stroke="#b89328" stroke-width="1"/>

  <!-- Inner cream flesh -->
  <path d="M 30 38 C 35 30, 48 26, 60 28 C 65 29, 70 32, 72 36 C 66 40, 58 38, 50 38 C 42 38, 36 40, 30 38 Z"
        fill="url(#flesh)" stroke="#e8d8a0" stroke-width="0.5"/>

  <!-- Brown stem -->
  <ellipse cx="21" cy="42" rx="5" ry="4" fill="#7a5a2c" transform="rotate(-15, 21, 42)"/>
  <ellipse cx="21" cy="42" rx="3" ry="2.5" fill="#a2783b" transform="rotate(-15, 21, 42)"/>

  <!-- Brown tip -->
  <ellipse cx="77" cy="38" rx="5" ry="3.5" fill="#7a5a2c" transform="rotate(10, 77, 38)"/>
  <ellipse cx="77" cy="38" rx="3" ry="2" fill="#9b7b4a" transform="rotate(10, 77, 38)"/>
</svg>
